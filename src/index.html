<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <title>ClickFast</title>
</head>
<body>

<!-- // page accueil -->

<section id="accueil" class="bg-dark justify-content-center align-items-center">
    <div class="text-center">
        <div class="card shadow-lg border border-secondary p-5 bg-dark border rounded-5" style="width: 30rem;">
            <h1 class="card-title text-white mb-5 letter-spacing">Clic<span class="flip">k</span> <b class="text-danger">FAST</b></h1>
            <p class="card-text mb-5 text-white ">Cliquez le plus vite possible <br> pendant <b>5 secondes !</b></p>
            <div class="gap-3 d-flex flex-column justify-content-center align-itels-center">
                <input id="input_pseudo" type="text" class=" p-2 rounded px-3 border-0" placeholder="Votre pseudo...">
                <button id="start_game" class="btn btn-danger">Jouer</button>
                <button id="btnClassement1" class="btn btn-light">Classement</button>
            </div>
        </div>
    </div>
</section>

<!-- // page jeu -->

<section id="jeu" class="bg-dark flex-column justify-content-center align-items-center">
    <div class="text-white text-center">

        <div class="d-flex gap-4 mb-4 justify-content-center align-items-center">
            <div class="border border-secondary rounded text-white p-2 " style="width: 6rem; ">
                <p class="mb-0">TEMPS</p>
                <p id="timer" class="mb-0 p40"><strong></strong></p>
            </div>
            <div class="border border-secondary rounded p-2" style="width: 6rem; ">
                <p class="mb-0">SCORE</p>
                <p class="count mb-0 p40"><strong></strong></p>
            </div>
        </div>

        <div id="progress" class="progress-bar bg-danger " style=" height: 0.2rem;"></div>

        <button id="game" class="example-element btn btn-danger m-4 rounded-circle letter-spacing shadow-lg" style="width: 15rem; height: 15rem;"><strong>Cliquez !</strong></button>
        <p class="pseudo"></p>

    </div>
</section>

<!-- // page resultat -->

<section id="resultat" class="justify-content-center align-items-center">
    
    <div class="text-center ">
        <div class="card shadow border border-secondary p-5 bg-dark mb-2 text-white rounded-5" style="width: 30rem;">
            <h1 class="card-title mb-5 letter-spacing">RÉSULTAT</h1>
            <p class="pseudo card-text"></p>
            <p class="count text-danger p40"><strong></strong></p>
            <p>clics</p>
            <p id = 'moyenne'></p>
            <p id="phrase"></p>
            <div class="gap-3 d-flex flex-column justify-content-center align-itels-center">
                <button id="rejouer" class="btn btn-danger">Rejouer</button>
                <button id="btnClassement2" class="btn btn-light">Classement</button>
            </div>
        </div>
    </div>
</section>

<!-- // page classement -->

<section id="classement" class="bg-dark justify-content-center align-items-center text-white">
    
    <div class="card shadow border border-secondary p-5 bg-dark text-white text-center rounded-5" style="width: 30rem;">
        <h1 class="card-title mb-5 letter-spacing">CLASSEMENT</h1>
        <div>

        </div>
        <button id="retour" class="btn btn-light">Retour</button>
    </div>
</section>

    <script src="game.logic.js"></script>
    <script src="api.js"></script>
    <script src="script.js"></script>
</body>
</html>
