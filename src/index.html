<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <title>ClickFast</title>
</head>
<body>

    <h1 class="m-5 mx-auto text-center border border-clear p-3 shadow text-uppercase" style="width: 30rem;">Jeu : ClickFast</h1>

    <div class="card text-center m-auto shadow" style="width: 18rem; height: 18rem;">
        <div class="card-body">

            <button class="btn btn-primary m-3"id="game">Jouer</button>
            <p id="information"> Vous avez 5 secondes pour essayer de cliquer le plus possible <br> Bon courage !!!</p>
            <button id="number_click" class="btn btn-primary m-3 mx-auto"  style="display: none;">Cliquez moi</button>
            
            <div id="count" class="m-3 fs-1"></div>
            <div id="timer" class="m-3"></div>
            <div id="congratulations" class="m-3"></div>
            <button id="rejouer" class="mx-auto m-4 btn btn-primary" style="display: none;">Rejouer</button>
            
        </div>
    </div>
    <div class="card m-5 mx-auto" style="width: 30rem; ">
        <div class="card-body">
            <ol id="list" class="m-4 ">Meilleur scores</ol>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
